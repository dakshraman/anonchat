services:
  - name: anonchat
    type: web
    runtime: docker
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: anonchatdb
          property: externalDatabaseUrl
      - key: BROADCAST_CONNECTION
        value: reverb
      - key: REVERB_APP_ID
        generateValue: true
      - key: REVERB_APP_KEY
        generateValue: true
      - key: REVERB_APP_SECRET
        generateValue: true
      - key: REVERB_PORT
        value: "8080"
      - key: REVERB_SCHEME
        value: "https"
      - key: APP_KEY
        generateValue: true